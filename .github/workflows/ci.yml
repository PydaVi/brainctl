# Pipeline de CI para PRs: segurança (tfsec/trivy), qualidade Go e plan via OIDC.
name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-scan:
    name: Security scan (tfsec + trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          version: latest
          working_directory: modules

      - name: Setup Trivy
        uses: aquasecurity/trivy-action@0.21.0
        with:
          version: latest

      - name: Run trivy config (modules/)
        run: trivy config modules/

  go-quality:
    name: Go quality (gofmt, vet, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Arquivos não formatados:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  terragrunt-plan:
    name: Terragrunt plan
    runs-on: ubuntu-latest
    needs: [security-scan, go-quality]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve stack dir from PR body
        id: stack
        shell: bash
        run: |
          body="${{ github.event.pull_request.body }}"
          stack_dir=$(printf '%s\n' "$body" | sed -nE 's/.*stack[ _-]?dir:[[:space:]]*`?([^`[:space:]]+).*/\1/p' | head -n1)
          if [ -z "$stack_dir" ]; then
            echo "stack_dir não encontrado no corpo do PR. Use: stack_dir: stacks/ec2-app/dev"
            exit 1
          fi
          case "$stack_dir" in
            stacks/*) ;;
            *)
              echo "stack_dir inválido: $stack_dir (deve começar com stacks/)"
              exit 1
              ;;
          esac
          echo "stack_dir=$stack_dir" >> "$GITHUB_OUTPUT"

      - name: Run brainctl plan
        run: |
          mkdir -p artifacts
          go run ./cmd/brainctl plan --stack-dir "${{ steps.stack.outputs.stack_dir }}" | tee artifacts/plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terragrunt-plan-${{ github.event.pull_request.number }}
          path: artifacts/plan-output.txt

      - name: Comment plan output on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'artifacts/plan-output.txt';
            let body = '## Terragrunt plan\n';
            if (fs.existsSync(path)) {
              const content = fs.readFileSync(path, 'utf8');
              body += '```\n' + content.slice(0, 65000) + '\n```';
            } else {
              body += 'Plan output not found.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
