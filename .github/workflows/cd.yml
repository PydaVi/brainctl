# Pipeline de CD pós-merge: plan, aprovação manual em prod e apply via OIDC.
name: cd

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stack_dir:
        description: "Stack dir para aplicar (ex: stacks/ec2-app/prod)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  plan:
    name: Terragrunt plan (post-merge)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      stack_dir: ${{ steps.resolve.outputs.stack_dir }}
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve stack dir and environment
        id: resolve
        shell: bash
        run: |
          stack_dir=$(cat <<'EOF'
          ${{ vars.STACK_DIR }}
          EOF
          )

          if [ -z "$stack_dir" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            stack_dir='${{ inputs.stack_dir }}'
          fi

          if [ -z "$stack_dir" ]; then
            commit_msg='${{ github.event.head_commit.message }}'
            stack_dir=$(printf '%s\n' "$commit_msg" | sed -nE 's/.*stack[ _-]?dir:[[:space:]]*`?([^`[:space:]]+).*/\1/p' | head -n1)
          fi

          if [ -z "$stack_dir" ]; then
            echo "stack_dir não definido. Use vars.STACK_DIR, workflow_dispatch input, ou inclua no commit message: stack_dir: stacks/ec2-app/prod"
            exit 1
          fi

          case "$stack_dir" in
            */dev) environment="dev" ;;
            */staging) environment="staging" ;;
            */prod) environment="prod" ;;
            *)
              echo "Não foi possível inferir environment a partir do stack_dir: $stack_dir"
              exit 1
              ;;
          esac

          echo "stack_dir=$stack_dir" >> "$GITHUB_OUTPUT"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install Terragrunt
        shell: bash
        run: |
          version="${{ vars.TERRAGRUNT_VERSION }}"
          if [ -z "$version" ]; then
            echo "vars.TERRAGRUNT_VERSION não definido (ex: v0.67.0)"
            exit 1
          fi
          curl -sSL -o /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/${version}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION }}

      - name: Run brainctl plan
        run: |
          mkdir -p artifacts
          go run ./cmd/brainctl plan --stack-dir "${{ steps.resolve.outputs.stack_dir }}" | tee artifacts/plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terragrunt-plan-${{ github.run_id }}
          path: artifacts/plan-output.txt

  approve:
    name: Manual approval
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ needs.plan.outputs.environment }}
    steps:
      - name: Await approval
        run: echo "Aguardando aprovação manual no environment ${{ needs.plan.outputs.environment }}."

  apply:
    name: Terragrunt apply
    runs-on: ubuntu-latest
    needs: [plan, approve]
    permissions:
      id-token: write
      contents: read
    environment: ${{ needs.plan.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install Terragrunt
        shell: bash
        run: |
          version="${{ vars.TERRAGRUNT_VERSION }}"
          if [ -z "$version" ]; then
            echo "vars.TERRAGRUNT_VERSION não definido (ex: v0.67.0)"
            exit 1
          fi
          curl -sSL -o /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/${version}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION }}

      - name: Run brainctl apply
        run: go run ./cmd/brainctl apply --stack-dir "${{ needs.plan.outputs.stack_dir }}"
